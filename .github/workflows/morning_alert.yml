name: Morning Alert

"on":
  schedule:
    # Target: alert delivered before 9:30 AM ET market open.
    # GitHub Actions cron can delay up to ~2h on shared infrastructure.
    # Schedule at 7:00 AM ET (11:00 UTC EDT / 12:00 UTC EST) so worst-case
    # delivery is still before 9:30 AM ET even with a 2h delay.
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run morning alert pipeline
        env:
          TWIKIT_USERNAME: ${{ secrets.TWIKIT_USERNAME }}
          TWIKIT_EMAIL: ${{ secrets.TWIKIT_EMAIL }}
          TWIKIT_PASSWORD: ${{ secrets.TWIKIT_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
          RECIPIENT_PHONE_E164: ${{ secrets.RECIPIENT_PHONE_E164 }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TWITTER_COOKIES_JSON: ${{ secrets.TWITTER_COOKIES_JSON }}
        run: python -m influence_monitor.pipeline morning
