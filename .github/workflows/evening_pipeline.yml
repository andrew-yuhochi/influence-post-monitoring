name: Evening Pipeline

on:
  schedule:
    # 5:30 PM EST (22:30 UTC) — works year-round; 6:30 PM EDT in summer
    # Runs after market close. OHLCV API returns both open and close for
    # the full trading day in a single call, so no separate price-fetch step is needed.
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  evening:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Download database artifact
        uses: actions/download-artifact@v4
        with:
          name: signals-db
          path: data/

      - name: Run evening pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          DATABASE_PATH: data/signals.db
        run: python -m influence_monitor.pipeline evening

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signals-db
          path: data/signals.db
          retention-days: 90
          overwrite: true
